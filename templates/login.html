<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - FCEFN</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
    <link rel="icon" type="image/png" href="https://th.bing.com/th/id/OIP.YEv-v6TrbRZH6_qaOvTphgAAAA?w=160&h=180&c=7&r=0&o=7&pid=1.7&rm=3">
</head>
<body style="background-color: #f0f2f5; display: flex; flex-direction: column; min-height: 100vh;">

    <div class="header">
        <h1>Facultad de Ciencias Exactas, Físicas y Naturales - UNSJ</h1>
    </div>

    <div style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px;">
        <div class="card" style="width: 100%; max-width: 400px; padding: 30px;">
            <h2 style="text-align: center; margin-bottom: 20px;">Control de Acceso</h2>
            <hr style="margin-bottom: 20px; border: 0; border-top: 1px solid #eee;">

            {% with mensajes = get_flashed_messages(with_categories=true) %}
            {% if mensajes %}
                {% for category, mensaje in mensajes %}
                    <div class="alert alert-error">
                        {{ mensaje }}
                    </div>
                {% endfor %}
            {% endif %}
            {% endwith %}

            <form action="{{ url_for('login') }}" method="POST">
                <div class="form-group">
                    <label for="rol">Seleccione su Rol:</label>
                    <select id="rol" name="rol" class="form-input" required>
                        <option value="organizador">⚙️ Organizador</option>
                        <option value="evaluador">📝 Evaluador</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" class="form-input" required placeholder="Ingrese su clave">
                </div>

                <div style="text-align: center; margin-top: 25px;">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Ingresar al Sistema 🚪</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
